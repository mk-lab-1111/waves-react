  .serif { font-family: 'Shippori Mincho', serif; }

  header {
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #fff;
    display: flex;
    align-items: baseline;
    gap: 8px;
    text-decoration: none;
  }
  .logo span {
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.6);
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .back-link {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 18px;
    border-radius: 999px;
    transition: all 0.3s ease;
  }
  .back-link:hover { background: rgba(255,255,255,0.12); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .badge {
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: var(--clay);
    margin-bottom: 18px;
    font-weight: 500;
  }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(10,20,32,0.4);
  }
  .sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.75);
    margin-bottom: 56px;
    max-width: 360px;
  }

  /* Breathing circle */
  .stage {
    position: relative;
    width: 240px;
    height: 240px;
    margin-bottom: 48px;
  }
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
  }
  .ring.r2 { inset: 18px; border-color: rgba(255,255,255,0.14); }
  .core {
    position: absolute;
    inset: 36px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,201,160,0.45) 0%, rgba(52,86,107,0.25) 70%);
    box-shadow: 0 0 60px rgba(232,201,160,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 4s ease-in-out, opacity 4s ease-in-out;
  }
  .core.breathing {
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1);    opacity: 0.7; }
    50%      { transform: scale(1.18); opacity: 1;   }
  }
  .ring.breathing { animation: ringPulse 8s ease-in-out infinite; }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.04); }
  }

  .timer {
    font-family: 'Shippori Mincho', serif;
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }
  .status {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
    min-height: 1.4em;
  }

  .play-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    background: var(--clay);
    color: #2A2118;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 16px 40px -12px rgba(232,201,160,0.5);
    transition: transform 0.25s ease;
    margin-bottom: 28px;
  }
  .play-btn:active { transform: scale(0.94); }
  .play-btn svg { width: 28px; height: 28px; }

  .hint {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .completed-card {
    margin-top: 40px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 28px 32px;
    max-width: 380px;
    backdrop-filter: blur(6px);
    display: none;
  }
  .completed-card.show { display: block; animation: fadeUp 0.6s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .completed-card p.title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.1rem;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .completed-card p.desc {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.75);
    margin-bottom: 20px;
  }
  .cta-link {
    display: inline-block;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: #2A2118;
    background: var(--clay);
    padding: 12px 30px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 500;
  }

  footer {
    text-align: center;
    padding: 20px 24px 32px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <a href="nagi-lp.html" class="logo">凪 <span>NAGI</span></a>
  <a href="nagi-lp.html" class="back-link">LPに戻る</a>
</header>

<main>
  <p class="badge">DELTA &nbsp;・&nbsp; 0.5–4 Hz</p>
  <h1>深い眠りへ</h1>
  <p class="sub">
    ヘッドホンまたはイヤホンを装着し、<br>
    再生したらそのまま目を閉じてください。<br>
    これは1分30秒の試聴版です。
  </p>

  <div class="stage">
    <div class="ring r1" id="ring1"></div>
    <div class="ring r2" id="ring2"></div>
    <div class="core" id="core">
      <span class="timer" id="timer">1:30</span>
    </div>
  </div>

  <p class="status" id="status">タップして開始してください</p>

  <button class="play-btn" id="playBtn" aria-label="再生">
    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>

  <p class="hint">
    🎧 ヘッドホン推奨 ・ 音量は小さめから
  </p>

  <div class="completed-card" id="completedCard">
    <p class="title">お疲れ様でした</p>
    <p class="desc">
      本編は10分間。毎晩の習慣として、<br>
      より深い"うねり"を体験できます。
    </p>
    <a href="nagi-lp.html#cta" class="cta-link">凪について詳しく見る</a>
  </div>
</main>

<footer>
  ※ バイノーラルビートは聴覚刺激によるリラクゼーション体験です。効果の感じ方には個人差があります。<br>
  運転中・操作中の使用、大音量での再生はお控えください。
</footer>

<script>
  const DURATION = 90; // 1分30秒
  const LEFT_FREQ = 200;
  const RIGHT_FREQ = 203; // 差分 3Hz = デルタ波帯

  let audioCtx, oscL, oscR, gainL, gainR, masterGain;
  let timerInterval = null;
  let remaining = DURATION;
  let isPlaying = false;

  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const core = document.getElementById('core');
  const ring1 = document.getElementById('ring1');
  const ring2 = document.getElementById('ring2');
  const completedCard = document.getElementById('completedCard');

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${String(sec).padStart(2, '0')}`;
  }

  function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    oscL = audioCtx.createOscillator();
    oscR = audioCtx.createOscillator();
    oscL.type = 'sine';
    oscR.type = 'sine';
    oscL.frequency.value = LEFT_FREQ;
    oscR.frequency.value = RIGHT_FREQ;

    gainL = audioCtx.createGain();
    gainR = audioCtx.createGain();
    gainL.gain.value = 0;
    gainR.gain.value = 0;

    const merger = audioCtx.createChannelMerger(2);

    oscL.connect(gainL).connect(merger, 0, 0);
    oscR.connect(gainR).connect(merger, 0, 1);

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.18;

    merger.connect(masterGain).connect(audioCtx.destination);

    oscL.start();
    oscR.start();

    const now = audioCtx.currentTime;
    gainL.gain.linearRampToValueAtTime(1, now + 2.5);
    gainR.gain.linearRampToValueAtTime(1, now + 2.5);
  }

  function fadeOutAndStop(duration) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    gainL.gain.linearRampToValueAtTime(0, now + duration);
    gainR.gain.linearRampToValueAtTime(0, now + duration);
    setTimeout(() => {
      try {
        oscL.stop();
        oscR.stop();
        audioCtx.close();
      } catch (e) {}
      audioCtx = null;
    }, duration * 1000 + 100);
  }

  function start() {
    setupAudio();
    isPlaying = true;
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
    statusEl.textContent = '目を閉じて、ゆっくり呼吸してください';
    core.classList.add('breathing');
    ring1.classList.add('breathing');
    ring2.classList.add('breathing');
    completedCard.classList.remove('show');

    timerInterval = setInterval(() => {
      remaining--;
      timerEl.textContent = formatTime(remaining);

      if (remaining <= 3 && remaining > 0) {
        fadeOutAndStop(remaining);
      }

      if (remaining <= 0) {
        clearInterval(timerInterval);
        finish();
      }
    }, 1000);
  }

  function pause() {
    isPlaying = false;
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    statusEl.textContent = '一時停止中';
    core.classList.remove('breathing');
    ring1.classList.remove('breathing');
    ring2.classList.remove('breathing');
    clearInterval(timerInterval);
    fadeOutAndStop(0.6);
  }

  function finish() {
    isPlaying = false;
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    statusEl.textContent = '完了しました';
    core.classList.remove('breathing');
    ring1.classList.remove('breathing');
    ring2.classList.remove('breathing');
    completedCard.classList.add('show');
  }

  playBtn.addEventListener('click', () => {
    if (remaining <= 0) {
      remaining = DURATION;
      timerEl.textContent = formatTime(remaining);
      completedCard.classList.remove('show');
    }
    if (isPlaying) {
      pause();
    } else {
      start();
    }
  });
</script>
